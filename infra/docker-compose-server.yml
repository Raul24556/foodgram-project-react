version: '3.8'

services:
  # Сервис бэкенда (Django)
  app_backend:
    image: raul24556/foodgram_backend:1.1
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - static_content:/app/static/  # Статические файлы бэкенда
      - media_content:/app/media/    # Медиафайлы (изображения рецептов, аватарки)
    depends_on:
      - database
    env_file:
      - ./config/.env
    networks:
      - app_network

  # Сервис базы данных (PostgreSQL)
  database:
    image: postgres:17
    volumes:
      - db_data:/var/lib/postgresql/data/  # Хранение данных базы
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodgram_user}      # Имя пользователя
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodgram_password}  # Пароль
      POSTGRES_DB: ${POSTGRES_DB:-foodgram_db}            # Название базы
    env_file:
      - ./config/.env
    restart: unless-stopped
    networks:
      - app_network

  # Сервис Nginx (веб-сервер и прокси)
  webserver:
    image: nginx:1.25  # Используем свежую версию Nginx
    ports:
      - "8080:80"    # HTTP порт
      - "8443:443"   # HTTPS порт
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf  # Конфигурация Nginx
      - ./frontend/build:/usr/share/nginx/html/            # Статические файлы фронтенда
      - ./docs:/usr/share/nginx/html/api/docs              # Документация API
      - static_content:/var/html/static/                   # Статические файлы бэкенда
      - media_content:/var/html/media/                     # Медиафайлы
      - ./certs:/etc/nginx/certs:ro                        # SSL-сертификаты
      - nginx_logs:/var/log/nginx                          # Логи Nginx
    depends_on:
      - app_backend
    restart: unless-stopped
    networks:
      - app_network

# Определение томов для хранения данных
volumes:
  static_content:    # Для статических файлов
  media_content:     # Для медиафайлов
  db_data:           # Для данных базы
  nginx_logs:        # Для логов Nginx

# Определение сети
networks:
  app_network:
    driver: bridge

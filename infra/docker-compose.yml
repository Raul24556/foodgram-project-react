version: '3.8'

services:
  # Сервис бэкенда (Django)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - static_data:/app/collected_static  # Соответствует STATIC_ROOT
      - media_data:/app/media             # Медиафайлы
    env_file:
      - ../backend/.env
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,nginx
    depends_on:
      - db
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 foodgram.wsgi:application"
    networks:
      - app_network

  # Сервис базы данных (PostgreSQL)
  db:
    image: postgres:17  # Обновлено до версии 17 для консистентности
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodgram_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodgram_password}
      POSTGRES_DB: ${POSTGRES_DB:-foodgram_db}
    env_file:
      - ../backend/.env  # Унифицировано с бэкендом
    restart: always
    networks:
      - app_network

  # Сервис Nginx (веб-сервер и прокси)
  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../frontend/build:/usr/share/nginx/html
      - static_data:/var/html/static
      - media_data:/var/html/media
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    restart: always
    networks:
      - app_network

# Определение томов для хранения данных
volumes:
  static_data:
  media_data:
  db_data:
  nginx_logs:

# Определение сети
networks:
  app_network:
    driver: bridge

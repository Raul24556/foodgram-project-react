version: '3.8'

services:
  # Сервис бэкенда (Django)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - static_data:/app/static  # Статические файлы бэкенда
      - media_data:/app/media    # Медиафайлы (изображения рецептов, аватарки)
    env_file:
      - ../backend/.env
    depends_on:
      - db
    restart: always

  # Сервис базы данных (PostgreSQL)
  db:
    image: postgres:14
    volumes:
      - db_data:/var/lib/postgresql/data  # Хранение данных базы
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodgram_user}      # Имя пользователя
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodgram_password}  # Пароль
      POSTGRES_DB: ${POSTGRES_DB:-foodgram_db}            # Название базы
    env_file:
      - ../infra/.env.db
    restart: always

  # Сервис Nginx (веб-сервер и прокси)
  nginx:
    image: nginx:1.25  # Используем свежую версию Nginx
    ports:
      - "80:80"    # HTTP порт
      - "443:443"  # HTTPS порт
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf  # Конфигурация Nginx
      - ../frontend/build:/usr/share/nginx/html      # Статические файлы фронтенда
      - static_data:/var/html/static                # Статические файлы бэкенда
      - media_data:/var/html/media                   # Медиафайлы
      - ./certs:/etc/nginx/certs:ro                  # SSL-сертификаты
      - nginx_logs:/var/log/nginx                    # Логи Nginx
    depends_on:
      - backend
    restart: always

# Определение томов для хранения данных
volumes:
  static_data:    # Для статических файлов
  media_data:     # Для медиафайлов
  db_data:        # Для данных базы
  nginx_logs:     # Для логов Nginx

# Определение upstream для бэкенда
upstream backend {
    server backend:8000;
}

# Сервер для HTTP (порт 80) с перенаправлением на HTTPS
server {
    listen 80;
    server_name localhost 127.0.0.1;
    server_tokens off;

    # Перенаправление всех HTTP-запросов на HTTPS
    return 301 https://$host$request_uri;
}

# Сервер для HTTPS (порт 443)
server {
    listen 443 ssl;
    server_name localhost 127.0.0.1;
    server_tokens off;

    # Настройка SSL
    ssl_certificate /etc/nginx/certs/self-signed.crt;
    ssl_certificate_key /etc/nginx/certs/self-signed.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Общие заголовки для прокси-запросов
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Документация API
    location /api/docs/ {
        root /usr/share/nginx/html;
        try_files $uri /api/docs/redoc.html =404;
    }

    # Файл openapi-schema.yml
    location /api/docs/openapi-schema.yml {
        root /usr/share/nginx/html;
        try_files $uri =404;
        default_type text/yaml;
    }

    # Медиафайлы
    location /media/ {
        alias /var/html/media/;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Статические файлы
    location /static/ {
        alias /var/html/static/;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API бэкенда
    location /api/ {
        proxy_pass http://backend/;
        proxy_redirect off;
    }

    # Админка Django
    location /admin/ {
        proxy_pass http://backend/;
        proxy_redirect off;
    }

    # Фронтенд (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;
    }

    # Обработка ошибок
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
